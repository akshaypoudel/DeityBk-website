<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nova Labs — we design and build mobile apps, software, and websites that move brands forward."
    />
    <title>Nova Labs — Digital Product Studio</title>

    <!-- Social share preview (Open Graph + Twitter).
         👉 Replace the URL + image with your real domain and a 1200×630
         image once you deploy. Put the image in /public and name it og-image.
         Note: link-preview scrapers read THESE static tags. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nova Labs — Digital Product Studio" />
    <meta
      property="og:description"
      content="We design and build mobile apps, software, and websites that move brands forward."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:url" content="https://your-domain.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nova Labs — Digital Product Studio" />
    <meta
      name="twitter:description"
      content="We design and build mobile apps, software, and websites that move brands forward."
    />
    <meta name="twitter:image" content="/og-image.svg" />
    <meta name="theme-color" content="#6c4eff" />
    <!-- Prevent theme flash: apply saved mode + custom colours before paint -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('theme');
          if (!mode) mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var root = document.documentElement;
          root.classList.toggle('dark', mode === 'dark');
          var saved = JSON.parse(localStorage.getItem('nova-custom-colors') || '{}');
          var set = saved[mode];
          if (set) {
            var toCh = function (hex) {
              hex = String(hex).replace('#', '');
              if (hex.length === 3) hex = hex.split('').map(function (c) { return c + c; }).join('');
              var n = parseInt(hex, 16);
              return ((n >> 16) & 255) + ' ' + ((n >> 8) & 255) + ' ' + (n & 255);
            };
            ['primary', 'secondary', 'accent', 'text'].forEach(function (k) {
              if (set[k]) root.style.setProperty('--' + k, toCh(set[k]));
            });
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
